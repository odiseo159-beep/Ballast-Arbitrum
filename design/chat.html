<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ballast — Chat with your agent</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --deep-ocean: #081826;
      --midnight: #10293F;
      --gold: #D6B36A;
      --gold-soft: #E4C887;
      --teal: #5FA7A0;
      --mist: #F6F5F2;
      --soft-stone: #D8D6D1;
      --slate: #7A848E;
      --graphite: #1D232A;
      --line: rgba(214, 179, 106, 0.18);
      --line-strong: rgba(214, 179, 106, 0.35);
      --surface: rgba(255,255,255,0.025);
      --surface-2: rgba(255,255,255,0.04);
      --card-border: rgba(255,255,255,0.06);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--deep-ocean);
      color: var(--mist);
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 400; line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    .display { font-family: 'Manrope', sans-serif; letter-spacing: -0.025em; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    noscript { display: none; }
    button { font-family: inherit; cursor: pointer; }

    @keyframes fadeUp {
      from { transform: translateY(10px); }
      to   { transform: translateY(0); }
    }
    @keyframes pulse-gold {
      0%,100% { opacity: 0.85; }
      50%     { opacity: 1; }
    }
    @keyframes blink { 50% { opacity: 0; } }
    @keyframes spin  { to { transform: rotate(360deg); } }
    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    .blink-cursor::after {
      content: '';
      display: inline-block;
      width: 0.5ch;
      height: 1em;
      background: currentColor;
      margin-left: 2px;
      vertical-align: -2px;
      animation: blink 1s steps(2) infinite;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(214,179,106,0.2); border-radius: 3px; }
  </style>
</head>
<body>
  <noscript><div style="padding:40px;text-align:center;color:var(--gold)">Ballast needs JavaScript.</div></noscript>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="chat-parts.jsx"></script>
  <script type="text/babel" src="chat.jsx"></script>
</body>
</html>
