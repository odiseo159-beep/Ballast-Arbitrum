<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ballast — Stability in uncertain economies</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --deep-ocean: #081826;
      --midnight: #10293F;
      --gold: #D6B36A;
      --gold-soft: #E4C887;
      --teal: #5FA7A0;
      --mist: #F6F5F2;
      --soft-stone: #D8D6D1;
      --slate: #7A848E;
      --graphite: #1D232A;
      --line: rgba(214, 179, 106, 0.18);
      --line-strong: rgba(214, 179, 106, 0.35);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--deep-ocean);
      color: var(--mist);
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 400;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    .display { font-family: 'Manrope', sans-serif; letter-spacing: -0.025em; }
    .mono { font-family: 'JetBrains Mono', monospace; }

    /* Brand mark */
    .anchor-mark {
      display: inline-block;
      width: 32px;
      height: 32px;
      position: relative;
    }
    .anchor-mark svg { display: block; width: 100%; height: 100%; }

    /* Ocean waves baseline (used in hero) */
    @keyframes drift {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    @keyframes drift-slow {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-6px); }
    }
    @keyframes pulse-gold {
      0%, 100% { opacity: 0.85; }
      50%      { opacity: 1; }
    }
    @keyframes glow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(214,179,106, 0.35); }
      50%      { box-shadow: 0 0 0 14px rgba(214,179,106, 0); }
    }
    @keyframes fadeUp {
      from { transform: translateY(16px); }
      to   { transform: translateY(0); }
    }
    @keyframes blink { 50% { opacity: 0; } }

    .blink-cursor::after {
      content: '';
      display: inline-block;
      width: 0.5ch;
      height: 1em;
      background: currentColor;
      margin-left: 2px;
      vertical-align: -2px;
      animation: blink 1s steps(2) infinite;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--deep-ocean); }
    ::-webkit-scrollbar-thumb { background: rgba(214,179,106,0.25); border-radius: 4px; }

    noscript { display: none; }

    /* Tooltip-style noscript */
    .noscript { padding: 40px; text-align: center; color: var(--gold); }

    /* image-slot overrides */
    image-slot {
      --image-slot-bg: rgba(255,255,255,0.02);
      --image-slot-border: rgba(214,179,106,0.25);
      --image-slot-fg: rgba(246,245,242,0.6);
    }
  </style>
</head>
<body>
  <noscript><div class="noscript">Ballast needs JavaScript to render the horizon.</div></noscript>

  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="image-slot.js"></script>

  <script type="text/babel" src="landing-parts.jsx"></script>
  <script type="text/babel" src="landing.jsx"></script>
  <script type="text/babel" src="landing-sections.jsx"></script>
</body>
</html>
